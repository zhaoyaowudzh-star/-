# render.yaml
services:
  # 定义 omnibox 这个服务
  - type: web
    name: omnibox
    # 使用 Docker 环境来部署
    runtime: docker
    # 告诉 Render 去哪里拉取 OmniBox 的官方 Docker 镜像
    image:
      # 如果希望用轻量版，将 latest 替换为 lite 即可
      url: lampon/omnibox:latest
      # 如果镜像在私有仓库，需要提供凭证，这里使用公开仓库，所以不需要
    # 服务的健康检查路径
    healthCheckPath: /
    # 环境变量：服务启动时所需的配置，如数据库类型、端口等
    envVars:
      - key: PORT
        value: "7023"
      # 设置时区
      - key: TZ
        value: "Asia/Shanghai"
      # 使用默认的 SQLite 数据库，所以 DATABASE_TYPE 不设置
      # 如果需要使用外部数据库（如 Render 的 PostgreSQL），可以在这里添加相关变量
    # 定义一个持久化磁盘，用于存放 SQLite 数据库文件等数据
    disk:
      name: omnibox-data
      mountPath: /app/data
      # 根据你的使用情况调整，免费套餐最大为 10GB
      sizeGB: 1